    <title>PuncakGO - الفلل</title>

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; padding-bottom: 30px; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .back-btn { background: linear-gradient(135deg, #DAA520, #B8860B); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .lang-switch { background: linear-gradient(135deg, #DAA520, #B8860B); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        h2 { color: #B8860B; cursor: pointer; }
        .price-filter { background: white; border-radius: 25px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #DAA520; }
        .price-filter h3 { color: #B8860B; margin-bottom: 15px; text-align: center; }
        .price-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .price-btn { background: #f0f0f0; border: 2px solid #DAA520; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .price-btn:hover, .price-btn.active { background: linear-gradient(135deg, #DAA520, #B8860B); color: white; }
        .map-container { position: relative; text-align: center; margin: 20px 0; }
        .villa-map-img { max-width: 100%; border-radius: 20px; border: 3px solid #DAA520; }
        .map-note { color: #B8860B; font-size: 0.8rem; margin-top: 5px; }
        .pin { position: absolute; width: 30px; height: 30px; background: #DAA520; border: 2px solid white; border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 10; }
        .pin:hover { background: #B8860B; transform: translate(-50%, -50%) scale(1.1); }
        .villas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; }
        .villa-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid #DAA520; transition: transform 0.2s; scroll-margin-top: 100px; }
        .villa-card:hover { transform: translateY(-5px); }
        .slider-container { position: relative; }
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; }
        .slider img { width: 100%; min-width: 100%; height: 220px; object-fit: cover; scroll-snap-align: start; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 50%; font-size: 18px; }
        .slider-btn.prev { left: 5px; }
        .slider-btn.next { right: 5px; }
        .villa-info { padding: 15px; }
        .villa-name { font-size: 1.3rem; font-weight: bold; color: #B8860B; }
        .villa-price { margin: 10px 0; }
        .villa-price span { color: #DAA520; font-weight: bold; font-size: 1.2rem; }
        .features { display: none; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .features.show { display: flex; }
        .feature { background: #f9f9f9; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #DAA520; }
        .show-features-btn { background: #DAA520; color: white; border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; margin: 5px 0; width: 100%; }
        .show-features-btn:hover { background: #B8860B; }
        .book-btn { background: linear-gradient(135deg, #DAA520, #B8860B); color: white; border: none; padding: 10px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .admin-btn { background: #DAA520; color: white; border: none; padding: 5px 10px; border-radius: 20px; margin-top: 8px; cursor: pointer; width: 48%; font-size: 0.8rem; }
        .admin-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; border-top: 5px solid #DAA520; }
        .modal-content h3 { color: #B8860B; margin-bottom: 15px; text-align: center; }
        .modal-content input, .modal-content textarea { width: 100%; margin: 8px 0; padding: 12px; border-radius: 25px; border: 1px solid #DAA520; font-family: inherit; }
        .order-summary { background: #f9f9f9; padding: 15px; border-radius: 20px; margin: 15px 0; text-align: center; }
        .total-price { font-size: 1.3rem; font-weight: bold; color: #DAA520; }
        .modal-content button { background: linear-gradient(135deg, #DAA520, #B8860B); color: white; border: none; padding: 12px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .cancel-btn { background: #8B0000 !important; }
        .image-item { position: relative; display: inline-block; margin: 5px; }
        .image-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 2px solid #DAA520; }
        .delete-img-btn { position: absolute; top: -8px; right: -8px; background: red; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
        .feature-item { background: #f0f0f0; padding: 5px 10px; border-radius: 20px; margin: 3px; display: inline-block; }
        .feature-item .remove-feature { background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; margin-left: 5px; font-size: 10px; }
        .admin-toggle-btn { background: #8B0000; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px; display: block; width: 200px; margin-left: auto; margin-right: auto; }
        .villas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .villas-grid .villa-card:first-child { order: 1; }
        .villas-grid .villa-card:last-child { order: 2; }
        .villas-grid .villa-card:nth-child(4n+3) { order: 2; }
        .villas-grid .villa-card:nth-child(4n+4) { order: 1; }
        @media (max-width: 768px) {
            .villas-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
            .villas-grid .villa-card { order: 0 !important; }
            .slider img { height: 180px !important; }
            .villa-name { font-size: 0.85rem !important; }
            .villa-price { font-size: 0.75rem !important; }
            .villa-price span { font-size: 0.85rem !important; }

            .show-features-btn { font-size: 0.65rem !important; padding: 4px 8px !important; }
            .pin { width: 18px !important; height: 18px !important; font-size: 8px !important; }
            .map-note { font-size: 0.65rem !important; }
        }

    </style>
</head>

<div class="container">
    <div class="page-header">
        <button class="back-btn" id="backBtn">← رجوع</button>
        <h2 id="pageTitle">🏡 الفلل</h2>
        <button class="lang-switch" id="langBtn">English</button>
    </div>
    <div class="price-filter">
        <h3 id="filterTitle">🔍 فلتر حسب السعر (ألف روبيه)</h3>
        <div class="price-buttons" id="priceButtons">
            <button class="price-btn" data-price="500">500</button>
            <button class="price-btn" data-price="1000">1000</button>
            <button class="price-btn" data-price="1500">1500</button>
            <button class="price-btn" data-price="2000">2000</button>
            <button class="price-btn" data-price="2500">2500</button>
            <button class="price-btn active" data-price="all">الكل</button>
        </div>
    </div>
    <div class="map-container" id="mapContainer">
        <img src="villabackground.jpg" alt="خريطة الفلل" class="villa-map-img" id="villaMap" onerror="this.src='https://picsum.photos/id/104/800/500'">
        <div id="pinsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
        <div class="map-note" id="mapNote">📍 اضغط على أي دبوس للانتقال إلى الفيلا</div>
    </div>
    <div id="villasGrid" class="villas-grid"></div>
    <button id="adminModeBtn" class="admin-toggle-btn">🔐 دخول الأدمن</button>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">📝 حجز فيلا</h3>
        <input type="text" id="custName" placeholder="الاسم الكامل">
        <input type="tel" id="custPhone" placeholder="رقم الجوال">
        <input type="date" id="dateFrom">
        <input type="date" id="dateTo">
        <input type="number" id="persons" placeholder="عدد الأشخاص" min="1" value="2">
        <textarea id="notes" rows="2" placeholder="ملاحظات إضافية"></textarea>
        <div class="order-summary">
            <p>🏨 عدد الليالي: <span id="nightsCount">0</span></p>
            <p>💰 السعر لليلة: <span id="pricePerNight">0</span> ألف روبيه</p>
            <p class="total-price">💎 الإجمالي: <span id="totalPrice">0</span> ألف روبيه</p>
        </div>
        <button id="confirmOrderBtn">✅ تأكيد الحجز وإرسال إلى واتساب</button>
        <button id="cancelOrderBtn" class="cancel-btn">إلغاء</button>
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content">
        <h3 id="imageModalTitle">📷 إدارة صور الفيلا</h3>
        <div id="imagesList" style="display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;"></div>
        <div style="display: flex; gap: 10px;">
            <input type="file" id="imageUpload" accept="image/*" style="flex:1;">
            <button id="addImageBtn">➕ إضافة</button>
        </div>
        <button id="closeImageModal" class="cancel-btn" style="margin-top:15px;">إغلاق</button>
    </div>
</div>

<div id="featuresModal" class="modal">
    <div class="modal-content">
        <h3 id="featuresModalTitle">📋 إدارة المواصفات</h3>
        <div id="featuresList" style="display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0;"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newFeatureAr" placeholder="مواصفة بالعربية" style="flex:1;">
            <input type="text" id="newFeatureEn" placeholder="مواصفة بالإنجليزية" style="flex:1;">
            <button id="addFeatureBtn">➕ إضافة</button>
        </div>
        <button id="closeFeaturesModal" class="cancel-btn" style="margin-top:15px;">إغلاق</button>
    </div>
</div>

    // حفظ التعديلات في Supabase
    async function saveVillaToSupabase(villa) {
        try {
            const { error } = await supabase.from('villas').upsert({
                id: villa.id,
                name_ar: villa.name_ar,
                name_en: villa.name_en,
                price: villa.price,
                price_range: villa.price_range,
                pos_x: villa.pos_x,
                pos_y: villa.pos_y,
                images: villa.images,
                features_ar: villa.features_ar,
                features_en: villa.features_en
            });
            if (error) console.error('Error saving to Supabase:', error);
            else console.log('Saved villa', villa.id);
        } catch(e) { console.error(e); }
    }

    // رفع جميع البيانات إلى Supabase (مرة واحدة)
    async function uploadAllToSupabase() {
        const { count } = await supabase.from('villas').select('*', { count: 'exact', head: true });
        if (count === 0) {
            console.log('Uploading all villas to Supabase...');
            for (const villa of villasData) {
                await saveVillaToSupabase(villa);
            }
            console.log('Upload complete!');
        }
    }

    // العرض
    function renderPins() {
        let container = document.getElementById('pinsContainer');
        let mapImg = document.getElementById('villaMap');
        if (!container || !mapImg) return;
        container.innerHTML = '';
        let filtered = currentFilter === "all" ? villasData : villasData.filter(v => v.price_range == currentFilter);
        filtered.forEach(villa => {
            let pin = document.createElement('div');
            pin.className = 'pin';
            pin.setAttribute('data-id', villa.id);
            pin.style.left = `${villa.pos_x}%`;
            pin.style.top = `${villa.pos_y}%`;
            pin.innerHTML = `<span>${villa.id}</span>`;
            pin.addEventListener('click', (e) => {
                e.stopPropagation();
                let villaCard = document.querySelector(`.villa-card[data-id="${villa.id}"]`);
                if (villaCard) { villaCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); villaCard.style.boxShadow = '0 0 0 3px #DAA520'; setTimeout(() => { villaCard.style.boxShadow = ''; }, 2000); }
            });
            container.appendChild(pin);
        });
    }

    function renderVillas() {
        let filtered = currentFilter === "all" ? villasData : villasData.filter(v => v.price_range == currentFilter);
        let container = document.getElementById('villasGrid');
        if (!container) return;
        container.innerHTML = '';
        filtered.forEach(villa => {
            let card = document.createElement('div');
            card.className = 'villa-card';
            card.setAttribute('data-id', villa.id);
            let slidesHtml = ''; villa.images.forEach(img => { slidesHtml += `<img src="${img}" alt="Villa">`; });
            let features = isArabic ? villa.features_ar : villa.features_en;
            let featuresHtml = '<div class="features" id="features-' + villa.id + '">'; features.forEach(f => { featuresHtml += `<span class="feature">${f}</span>`; }); featuresHtml += '</div>';
            card.innerHTML = `<div class="slider-container"><div class="slider" id="slider-${villa.id}">${slidesHtml}</div><button class="slider-btn prev" data-id="${villa.id}">❮</button><button class="slider-btn next" data-id="${villa.id}">❯</button></div><div class="villa-info"><div class="villa-name">${isArabic ? villa.name_ar : villa.name_en}</div><div class="villa-price">💰 ${isArabic ? 'السعر لليلة:' : 'Price per night:'} <span>${(villa.price / 1000).toLocaleString()}</span> ${isArabic ? 'ألف روبيه' : 'K IDR'}</div><button class="show-features-btn" data-id="${villa.id}">📋 ${isArabic ? 'عرض المواصفات' : 'Show Features'}</button>${featuresHtml}<button class="book-btn" data-id="${villa.id}">📝 ${isArabic ? 'حجز الآن' : 'Book Now'}</button>${isAdmin ? `<div class="admin-buttons"><button class="admin-btn" data-action="images" data-id="${villa.id}">📷 إدارة الصور</button><button class="admin-btn" data-action="features" data-id="${villa.id}">📋 إدارة المواصفات</button><button class="admin-btn" data-action="edit" data-id="${villa.id}">✏️ تعديل</button></div>` : ''}</div>`;
            container.appendChild(card);
        });
        document.querySelectorAll('.slider-btn.prev').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = btn.getAttribute('data-id'); let slider = document.getElementById(`slider-${id}`); slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' }); }); });
        document.querySelectorAll('.slider-btn.next').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = btn.getAttribute('data-id'); let slider = document.getElementById(`slider-${id}`); slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' }); }); });
        document.querySelectorAll('.show-features-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = btn.getAttribute('data-id'); let featuresDiv = document.getElementById(`features-${id}`); if (featuresDiv) { featuresDiv.classList.toggle('show'); btn.innerHTML = featuresDiv.classList.contains('show') ? '📋 ' + (isArabic ? 'إخفاء المواصفات' : 'Hide Features') : '📋 ' + (isArabic ? 'عرض المواصفات' : 'Show Features'); } }); });
        document.querySelectorAll('.book-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = parseInt(btn.getAttribute('data-id')); currentVilla = villasData.find(v => v.id === id); openOrderModal(); }); });
        if(isAdmin) { document.querySelectorAll('.admin-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = parseInt(btn.getAttribute('data-id')); let action = btn.getAttribute('data-action'); currentEditVillaId = id; if(action === 'images') openImageManager(id); if(action === 'features') openFeaturesManager(id); if(action === 'edit') editVillaInfo(id); }); }); }
    }

    async function openImageManager(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let modal = document.getElementById('imageModal');
        let imagesList = document.getElementById('imagesList');
        imagesList.innerHTML = '';
        villa.images.forEach((img, idx) => { imagesList.innerHTML += `<div class="image-item"><img src="${img}"><button class="delete-img-btn" data-idx="${idx}">✕</button></div>`; });
        modal.style.display = 'flex';
        document.querySelectorAll('.delete-img-btn').forEach(btn => { btn.addEventListener('click', async () => { let idx = parseInt(btn.getAttribute('data-idx')); villa.images.splice(idx, 1); await saveVillaToSupabase(villa); renderVillas(); renderPins(); openImageManager(villaId); }); });
        document.getElementById('addImageBtn').onclick = async () => { let fileInput = document.getElementById('imageUpload'); if(fileInput.files && fileInput.files[0]) { let url = await fileToBase64(fileInput.files[0]); villa.images.push(url); await saveVillaToSupabase(villa); renderVillas(); renderPins(); fileInput.value = ''; openImageManager(villaId); } else { alert('الرجاء اختيار صورة أولاً'); } };
    }

    async function openFeaturesManager(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let modal = document.getElementById('featuresModal');
        let featuresList = document.getElementById('featuresList');
        function renderFeatures() {
            featuresList.innerHTML = '';
            villa.features_ar.forEach((f, idx) => { featuresList.innerHTML += `<span class="feature-item">${f}<button class="remove-feature" data-idx="${idx}" data-lang="ar">✕</button></span>`; });
            villa.features_en.forEach((f, idx) => { featuresList.innerHTML += `<span class="feature-item">${f}<button class="remove-feature" data-idx="${idx}" data-lang="en">✕</button></span>`; });
            document.querySelectorAll('.remove-feature').forEach(btn => { btn.addEventListener('click', async () => { let idx = parseInt(btn.getAttribute('data-idx')); let lang = btn.getAttribute('data-lang'); if(lang === 'ar') villa.features_ar.splice(idx, 1); else villa.features_en.splice(idx, 1); await saveVillaToSupabase(villa); renderVillas(); renderPins(); renderFeatures(); }); });
        }
        renderFeatures();
        modal.style.display = 'flex';
        document.getElementById('addFeatureBtn').onclick = async () => { let newAr = document.getElementById('newFeatureAr').value.trim(); let newEn = document.getElementById('newFeatureEn').value.trim(); if(newAr) villa.features_ar.push(newAr); if(newEn) villa.features_en.push(newEn); await saveVillaToSupabase(villa); renderVillas(); renderPins(); renderFeatures(); document.getElementById('newFeatureAr').value = ''; document.getElementById('newFeatureEn').value = ''; };
    }

    async function editVillaInfo(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let newNameAr = prompt('أدخل اسم الفيلا بالعربية:', villa.name_ar);
        let newNameEn = prompt('أدخل اسم الفيلا بالإنجليزية:', villa.name_en);
        let newPrice = prompt('أدخل السعر الجديد (بالروبيه):', villa.price);
        if(newNameAr) villa.name_ar = newNameAr;
        if(newNameEn) villa.name_en = newNameEn;
        if(newPrice && !isNaN(newPrice)) villa.price = parseInt(newPrice);
        await saveVillaToSupabase(villa);
        renderVillas();
        renderPins();
        alert('تم تحديث بيانات الفيلا بنجاح');
    }

    function fileToBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); }); }
    function openOrderModal() { document.getElementById('modalTitle').innerText = isArabic ? `📝 حجز ${currentVilla.name_ar}` : `📝 Booking ${currentVilla.name_en}`; document.getElementById('pricePerNight').innerText = (currentVilla.price / 1000).toLocaleString(); document.getElementById('orderModal').style.display = 'flex'; calculateOrder(); }
    function calculateOrder() { let from = document.getElementById('dateFrom').value; let to = document.getElementById('dateTo').value; let nights = 0; if (from && to) { let start = new Date(from); let end = new Date(to); nights = Math.max(0, (end - start) / (1000 * 60 * 60 * 24)); } document.getElementById('nightsCount').innerText = nights; let total = nights * (currentVilla.price / 1000); document.getElementById('totalPrice').innerText = total.toLocaleString(); }
    function setupFilter() { document.querySelectorAll('.price-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.getAttribute('data-price'); renderVillas(); renderPins(); }); }); }
    function changeLanguage() { isArabic = !isArabic; document.body.style.direction = isArabic ? 'rtl' : 'ltr'; document.getElementById('pageTitle').innerText = isArabic ? '🏡 الفلل' : '🏡 Villas'; document.getElementById('filterTitle').innerHTML = isArabic ? '🔍 فلتر حسب السعر (ألف روبيه)' : '🔍 Filter by price (Thousand IDR)'; document.getElementById('langBtn').innerText = isArabic ? 'English' : 'العربية'; document.getElementById('mapNote').innerText = isArabic ? '📍 اضغط على أي دبوس للانتقال إلى الفيلا' : '📍 Click on any pin to go to the villa'; document.querySelector('.price-btn[data-price="all"]').innerText = isArabic ? 'الكل' : 'All'; renderVillas(); renderPins(); }
    const adminBtn = document.getElementById('adminModeBtn');
    function enterAdminMode() { let pwd = prompt('🔐 دخول الأدمن - أدخل كلمة السر:'); if(pwd === ADMIN_PASSWORD) { isAdmin = true; adminBtn.innerHTML = '🚪 الخروج من وضع الأدمن'; adminBtn.style.background = '#DAA520'; renderVillas(); alert('✅ تم تفعيل وضع الأدمن. أزرار الإدارة ظاهرة الآن.'); } else if(pwd !== null) { alert('❌ كلمة السر خطأ'); } }
    function exitAdminMode() { isAdmin = false; adminBtn.innerHTML = '🔐 دخول الأدمن'; adminBtn.style.background = '#8B0000'; renderVillas(); alert('✅ تم الخروج من وضع الأدمن.'); }
    adminBtn.addEventListener('click', () => { if(isAdmin) exitAdminMode(); else enterAdminMode(); });
    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.getElementById('langBtn').addEventListener('click', changeLanguage);
    document.getElementById('dateFrom').addEventListener('change', calculateOrder);
    document.getElementById('dateTo').addEventListener('change', calculateOrder);
    document.getElementById('confirmOrderBtn').addEventListener('click', () => { 
        let name = document.getElementById('custName').value, phone = document.getElementById('custPhone').value, fromDate = document.getElementById('dateFrom').value, toDate = document.getElementById('dateTo').value, persons = document.getElementById('persons').value, notes = document.getElementById('notes').value, nights = document.getElementById('nightsCount').innerText, total = document.getElementById('totalPrice').innerText; 
        if (!name || !phone || !fromDate || !toDate) { alert(isArabic ? 'الرجاء ملء جميع البيانات المطلوبة' : 'Please fill all required fields'); return; } 
        let message = `*${isArabic ? 'حجز جديد من تطبيق PuncakGO' : 'New Booking from PuncakGO App'}*%0A`; 
        message += `%0A*${isArabic ? 'الفيلا:' : 'Villa:'}* ${isArabic ? currentVilla.name_ar : currentVilla.name_en}%0A`; 
        message += `*${isArabic ? 'الاسم:' : 'Name:'}* ${name}%0A`; 
        message += `*${isArabic ? 'الجوال:' : 'Phone:'}* ${phone}%0A`; 
        message += `*${isArabic ? 'تاريخ الوصول:' : 'Check-in:'}* ${fromDate}%0A`; 
        message += `*${isArabic ? 'تاريخ المغادرة:' : 'Check-out:'}* ${toDate}%0A`; 
        message += `*${isArabic ? 'عدد الليالي:' : 'Nights:'}* ${nights}%0A`; 
        message += `*${isArabic ? 'عدد الأشخاص:' : 'Persons:'}* ${persons}%0A`; 
        message += `*${isArabic ? 'السعر الإجمالي:' : 'Total Price:'}* ${total} ${isArabic ? 'ألف روبيه' : 'K IDR'}%0A`; 
        if (notes) message += `*${isArabic ? 'ملاحظات:' : 'Notes:'}* ${notes}%0A`; 
        window.open(`https://wa.me/6281234567890?text=${message}`, '_blank'); 
        document.getElementById('orderModal').style.display = 'none'; 
        document.getElementById('custName').value = ''; document.getElementById('custPhone').value = ''; document.getElementById('dateFrom').value = ''; document.getElementById('dateTo').value = ''; document.getElementById('notes').value = ''; 
        alert(isArabic ? 'تم إرسال طلب الحجز بنجاح' : 'Booking request sent successfully'); 
    });
    document.getElementById('cancelOrderBtn').addEventListener('click', () => { document.getElementById('orderModal').style.display = 'none'; });
    document.getElementById('closeImageModal').addEventListener('click', () => { document.getElementById('imageModal').style.display = 'none'; });
    document.getElementById('closeFeaturesModal').addEventListener('click', () => { document.getElementById('featuresModal').style.display = 'none'; });
    window.addEventListener('resize', () => { renderPins(); });
    window.addEventListener('load', () => { setTimeout(renderPins, 200); });

    // بدء التشغيل
    renderVillas();
    setupFilter();
    setTimeout(() => renderPins(), 300);
    uploadAllToSupabase();
</script>
</body>
</html>
