        .pins-container {

            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none;
        }
        .pin { 
            position: absolute; 
            width: 36px; 
            height: 36px; 
            background: #DAA520; 
            border: 3px solid white; 
            border-radius: 50%; 
            cursor: pointer; 
            transform: translate(-50%, -50%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: bold; 
            color: white;

            z-index: 10;
            pointer-events: auto;
            transition: all 0.2s;

        .pin:hover, .pin.active { background: #ff6600; transform: translate(-50%, -50%) scale(1.15); }
        
        /* البطاقة المنبثقة - تصميم متجاوب */

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 280px;
            max-width: calc(100vw - 40px);
            z-index: 200;
            overflow: hidden;
            border: 2px solid #DAA520;
            animation: popupFadeIn 0.2s ease;
        }
        
        /* للجوال: البطاقة تظهر في أسفل الشاشة (Bottom Sheet) */
        @media (max-width: 768px) {
            .popup-card {
                position: fixed !important;
                bottom: 20px !important;
                left: 10px !important;
                right: 10px !important;
                top: auto !important;
                width: auto !important;
                max-width: none !important;
                border-radius: 25px !important;
                z-index: 1000 !important;
                animation: slideUp 0.3s ease !important;
            }
            @keyframes slideUp {
                from { transform: translateY(100%); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            .popup-card .popup-image {
                height: 180px !important;
            }
        }
        
        @keyframes popupFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 0; transform: translateY(0); }
        }
        
        .popup-header {
            background: linear-gradient(135deg, #DAA520, #B8860B);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            color: white;

        .popup-image {
            width: 100%;

        }
        .popup-body {

        }
        .popup-name {

        .popup-price {

    async function saveVillaToSupabase(villa) {
        try {
            await supabaseClient.from('villas').upsert({
                id: villa.id, name_ar: villa.name_ar, name_en: villa.name_en,
                price: villa.price, price_range: villa.price_range,
                pos_x: villa.pos_x, pos_y: villa.pos_y,
                images: villa.images, features_ar: villa.features_ar, features_en: villa.features_en
            });
        } catch(e) { console.error(e); }
    }

    function loadVillasData() { let saved = localStorage.getItem('villasData'); if(saved) villasData = JSON.parse(saved); }
    function saveVillasData() { localStorage.setItem('villasData', JSON.stringify(villasData)); }
    function fileToBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); }); }

    function closePopup() {
        let popup = document.querySelector('.popup-card');
        if(popup) popup.remove();
        currentPopupVilla = null;
        document.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
    }

    function openOrderModalForVilla(villa) {
        currentVilla = villa;
        document.getElementById('modalTitle').innerText = isArabic ? `📝 حجز ${villa.name_ar}` : `📝 Booking ${villa.name_en}`;
        document.getElementById('pricePerNight').innerText = (villa.price / 1000).toLocaleString();
        document.getElementById('orderModal').style.display = 'flex';
        calculateOrder();
    }

    function showPopup(villa, pinElement) {
        closePopup();
        currentPopupVilla = villa;
        
        const isMobile = window.innerWidth <= 768;
        const features = isArabic ? villa.features_ar : villa.features_en;
        let featuresHtml = '<div class="popup-features">';
        features.forEach(f => { featuresHtml += `<span class="popup-feature">${f}</span>`; });
        featuresHtml += '</div>';
        
        const popup = document.createElement('div');
        popup.className = 'popup-card';
        
        if (!isMobile) {
            // على الكمبيوتر: تحسب الموقع فوق الدبوس
            const pinRect = pinElement.getBoundingClientRect();
            const mapRect = document.getElementById('mapContainer').getBoundingClientRect();
            let popupTop = (pinRect.top - mapRect.top) - 170;
            let popupLeft = (pinRect.left - mapRect.left) - 120;
            if(popupTop < 10) popupTop = pinRect.top - mapRect.top + 40;
            if(popupLeft < 10) popupLeft = 10;
            if(popupLeft + 280 > mapRect.width) popupLeft = mapRect.width - 290;
            popup.style.top = popupTop + 'px';
            popup.style.left = popupLeft + 'px';
        } else {
            // على الجوال: تثبت في الأسفل
            popup.style.position = 'fixed';
            popup.style.bottom = '20px';
            popup.style.left = '10px';
            popup.style.right = '10px';
            popup.style.top = 'auto';
            popup.style.width = 'auto';
        }
        
        popup.innerHTML = `
            <div class="popup-header">
                <h4>${isArabic ? 'تفاصيل الفيلا' : 'Villa Details'}</h4>
                <button class="close-popup">✕</button>
            </div>
            <img class="popup-image" src="${villa.images[0] || 'https://picsum.photos/id/104/400/250'}" alt="Villa" onerror="this.src='https://picsum.photos/id/104/400/250'">
            <div class="popup-body">
                <div class="popup-name">${isArabic ? villa.name_ar : villa.name_en}</div>
                <div class="popup-price">💰 ${convertPrice(villa.price)}</div>
                ${featuresHtml}
                <button class="popup-book-btn">📝 ${isArabic ? 'حجز الآن' : 'Book Now'}</button>
            </div>
        `;
        
        document.getElementById('mapContainer').appendChild(popup);
        
        popup.querySelector('.close-popup').addEventListener('click', () => closePopup());
        popup.querySelector('.popup-book-btn').addEventListener('click', () => {
            openOrderModalForVilla(villa);
            closePopup();
        });
        
        pinElement.classList.add('active');
        
        // إغلاق عند الضغط خارج البطاقة
        setTimeout(() => {
            const closeHandler = (e) => {
                if (!popup.contains(e.target) && !pinElement.contains(e.target)) {
                    closePopup();
                    document.removeEventListener('click', closeHandler);
                }
            };
            document.addEventListener('click', closeHandler);
        }, 100);
    }

    function renderPins() {
        let container = document.getElementById('pinsContainer');
        if (!container) return;
        container.innerHTML = '';
        let filtered = currentFilter === "all" ? villasData : villasData.filter(v => v.price_range == currentFilter);
        filtered.forEach(villa => {
            let pin = document.createElement('div');
            pin.className = 'pin';
            pin.setAttribute('data-id', villa.id);
            pin.style.left = `${villa.pos_x}%`;
            pin.style.top = `${villa.pos_y}%`;
            pin.innerHTML = `<span>${villa.id}</span>`;
            pin.addEventListener('click', (e) => {
                e.stopPropagation();
                showPopup(villa, pin);
            });
            container.appendChild(pin);
        });
    }

    function renderVillas() {
        let filtered = currentFilter === "all" ? villasData : villasData.filter(v => v.price_range == currentFilter);
        let container = document.getElementById('villasGrid');
        container.innerHTML = '';
        filtered.forEach(villa => {
            let card = document.createElement('div');
            card.className = 'villa-card';
            card.setAttribute('data-id', villa.id);
            let slidesHtml = '';
            villa.images.forEach(img => { slidesHtml += `<img src="${img}" alt="Villa">`; });
            if(villa.images.length === 0) slidesHtml = '<img src="https://picsum.photos/id/104/400/250" alt="Villa">';
            let features = isArabic ? villa.features_ar : villa.features_en;
            let featuresHtml = '<div class="features" id="features-' + villa.id + '">';
            features.forEach(f => { featuresHtml += `<span class="feature">${f}</span>`; });
            featuresHtml += '</div>';
            
            card.innerHTML = `
                <div class="slider-container">
                    <div class="slider" id="slider-${villa.id}">${slidesHtml}</div>
                    <button class="slider-btn prev" data-id="${villa.id}">❮</button>
                    <button class="slider-btn next" data-id="${villa.id}">❯</button>
                </div>
                <div class="villa-info">
                    <div class="villa-name">${isArabic ? villa.name_ar : villa.name_en}</div>
                    <div class="villa-price">💰 ${isArabic ? 'السعر لليلة:' : 'Price per night:'} <span>${convertPrice(villa.price)}</span></div>
                    <button class="show-features-btn" data-id="${villa.id}">📋 ${isArabic ? 'عرض المواصفات' : 'Show Features'}</button>
                    ${featuresHtml}
                    <button class="book-btn" data-id="${villa.id}">📝 ${isArabic ? 'حجز الآن' : 'Book Now'}</button>
                    ${isAdmin ? `<div class="admin-buttons">
                        <button class="admin-btn" data-action="images" data-id="${villa.id}">📷 إدارة الصور</button>
                        <button class="admin-btn" data-action="features" data-id="${villa.id}">📋 إدارة المواصفات</button>
                        <button class="admin-btn" data-action="edit" data-id="${villa.id}">✏️ تعديل</button>
                    </div>` : ''}
                </div>
            `;
            container.appendChild(card);
        });
        
        document.querySelectorAll('.slider-btn.prev').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = btn.getAttribute('data-id');
                let slider = document.getElementById(`slider-${id}`);
                slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' });
            });
        });
        document.querySelectorAll('.slider-btn.next').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = btn.getAttribute('data-id');
                let slider = document.getElementById(`slider-${id}`);
                slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' });
            });
        });
        
        document.querySelectorAll('.show-features-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = btn.getAttribute('data-id');
                let featuresDiv = document.getElementById(`features-${id}`);
                if (featuresDiv) {
                    featuresDiv.classList.toggle('show');
                    btn.innerHTML = featuresDiv.classList.contains('show') ? '📋 ' + (isArabic ? 'إخفاء المواصفات' : 'Hide Features') : '📋 ' + (isArabic ? 'عرض المواصفات' : 'Show Features');
                }
            });
        });
        
        document.querySelectorAll('.book-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = parseInt(btn.getAttribute('data-id'));
                let villa = villasData.find(v => v.id === id);
                openOrderModalForVilla(villa);
            });
        });
        
        if(isAdmin) {
            document.querySelectorAll('.admin-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    let id = parseInt(btn.getAttribute('data-id'));
                    let action = btn.getAttribute('data-action');
                    currentEditVillaId = id;
                    if(action === 'images') await openImageManager(id);
                    if(action === 'features') await openFeaturesManager(id);
                    if(action === 'edit') editVillaInfo(id);
                });
            });
        }
    }

    async function openImageManager(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let modal = document.getElementById('imageModal');
        let imagesList = document.getElementById('imagesList');
        const refreshImages = () => {
            imagesList.innerHTML = '';
            villa.images.forEach((img, idx) => {
                imagesList.innerHTML += `<div class="image-item"><img src="${img}"><button class="delete-img-btn" data-idx="${idx}">✕</button></div>`;
            });
            document.querySelectorAll('.delete-img-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    let idx = parseInt(btn.getAttribute('data-idx'));
                    villa.images.splice(idx, 1);
                    saveVillasData();
                    await saveVillaToSupabase(villa);
                    renderVillas();
                    renderPins();
                    refreshImages();
                });
            });
        };
        refreshImages();
        modal.style.display = 'flex';
        document.getElementById('addImageBtn').onclick = async () => {
            let fileInput = document.getElementById('imageUpload');
            if(fileInput.files && fileInput.files[0]) {
                let url = await fileToBase64(fileInput.files[0]);
                villa.images.push(url);
                saveVillasData();
                await saveVillaToSupabase(villa);
                renderVillas();
                renderPins();
                fileInput.value = '';
                refreshImages();
            } else {
                alert('الرجاء اختيار صورة أولاً');
            }
        };
    }

    async function openFeaturesManager(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let modal = document.getElementById('featuresModal');
        let featuresList = document.getElementById('featuresList');
        const renderFeatures = () => {
            featuresList.innerHTML = '';
            villa.features_ar.forEach((f, idx) => {
                featuresList.innerHTML += `<span class="feature-item">${f}<button class="remove-feature" data-idx="${idx}" data-lang="ar">✕</button></span>`;
            });
            villa.features_en.forEach((f, idx) => {
                featuresList.innerHTML += `<span class="feature-item">${f}<button class="remove-feature" data-idx="${idx}" data-lang="en">✕</button></span>`;
            });
            document.querySelectorAll('.remove-feature').forEach(btn => {
                btn.addEventListener('click', async () => {
                    let idx = parseInt(btn.getAttribute('data-idx'));
                    let lang = btn.getAttribute('data-lang');
                    if(lang === 'ar') villa.features_ar.splice(idx, 1);
                    else villa.features_en.splice(idx, 1);
                    saveVillasData();
                    await saveVillaToSupabase(villa);
                    renderVillas();
                    renderPins();
                    renderFeatures();
                });
            });
        };
        renderFeatures();
        modal.style.display = 'flex';
        document.getElementById('addFeatureBtn').onclick = async () => {
            let newAr = document.getElementById('newFeatureAr').value.trim();
            let newEn = document.getElementById('newFeatureEn').value.trim();
            if(newAr) villa.features_ar.push(newAr);
            if(newEn) villa.features_en.push(newEn);
            saveVillasData();
            await saveVillaToSupabase(villa);
            renderVillas();
            renderPins();
            renderFeatures();
            document.getElementById('newFeatureAr').value = '';
            document.getElementById('newFeatureEn').value = '';
        };
    }

    function editVillaInfo(villaId) {
        let villa = villasData.find(v => v.id === villaId);
        let newNameAr = prompt('أدخل اسم الفيلا بالعربية:', villa.name_ar);
        let newNameEn = prompt('أدخل اسم الفيلا بالإنجليزية:', villa.name_en);
        let newPrice = prompt('أدخل السعر الجديد (بالروبيه):', villa.price);
        if(newNameAr) villa.name_ar = newNameAr;
        if(newNameEn) villa.name_en = newNameEn;
        if(newPrice && !isNaN(newPrice)) villa.price = parseInt(newPrice);
        saveVillasData();
        saveVillaToSupabase(villa);
        renderVillas();
        renderPins();
        alert('تم تحديث بيانات الفيلا بنجاح');
    }

    function calculateOrder() {
        let from = document.getElementById('dateFrom').value;
        let to = document.getElementById('dateTo').value;
        let nights = 0;
        if (from && to) {
            let start = new Date(from);
            let end = new Date(to);
            nights = Math.max(0, (end - start) / (1000 * 60 * 60 * 24));
        }
        document.getElementById('nightsCount').innerText = nights;
        let total = nights * (currentVilla.price / 1000);
        document.getElementById('totalPrice').innerText = total.toLocaleString();
    }

    function setupFilter() {
        document.querySelectorAll('.price-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-price');
                closePopup();
                renderVillas();
                renderPins();
            });
        });
    }

    function changeLanguage() {
        isArabic = !isArabic;
        document.body.style.direction = isArabic ? 'rtl' : 'ltr';
        document.getElementById('pageTitle').innerText = isArabic ? '🏡 الفلل' : '🏡 Villas';
        document.getElementById('filterTitle').innerHTML = isArabic ? '🔍 فلتر حسب السعر (ألف روبيه)' : '🔍 Filter by price (Thousand IDR)';
        document.getElementById('langBtn').innerText = isArabic ? 'English' : 'العربية';
        document.getElementById('mapNote').innerHTML = isArabic ? '📍 اضغط على أي دبوس لظهور تفاصيل الفيلا' : '📍 Click on any pin to show villa details';
        document.querySelector('.price-btn[data-price="all"]').innerText = isArabic ? 'الكل' : 'All';
        closePopup();
        renderVillas();
        renderPins();
    }

    const adminBtn = document.getElementById('adminModeBtn');
    function enterAdminMode() {
        let pwd = prompt('🔐 دخول الأدمن - أدخل كلمة السر:');
        if(pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            adminBtn.innerHTML = '🚪 الخروج من وضع الأدمن';
            adminBtn.style.background = '#DAA520';
            renderVillas();
            showToast('✅ تم تفعيل وضع الأدمن');
        } else if(pwd !== null) {
            showToast('❌ كلمة السر خطأ');
        }
    }
    function exitAdminMode() {
        isAdmin = false;
        adminBtn.innerHTML = '🔐 دخول الأدمن';
        adminBtn.style.background = '#8B0000';
        renderVillas();
        showToast('✅ تم الخروج من وضع الأدمن');
    }
    adminBtn.addEventListener('click', () => {
        if(isAdmin) exitAdminMode();
        else enterAdminMode();
    });

    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.getElementById('langBtn').addEventListener('click', changeLanguage);
    document.getElementById('dateFrom').addEventListener('change', calculateOrder);
    document.getElementById('dateTo').addEventListener('change', calculateOrder);
    
    document.getElementById('confirmOrderBtn').addEventListener('click', () => {
        let name = document.getElementById('custName').value;
        let phone = document.getElementById('custPhone').value;
        let fromDate = document.getElementById('dateFrom').value;
        let toDate = document.getElementById('dateTo').value;
        let persons = document.getElementById('persons').value;
        let notes = document.getElementById('notes').value;
        let nights = document.getElementById('nightsCount').innerText;
        let total = document.getElementById('totalPrice').innerText;
        if (!name || !phone || !fromDate || !toDate) {
            showToast(isArabic ? 'الرجاء ملء جميع البيانات المطلوبة' : 'Please fill all required fields');
            return;
        }
        let message = `*${isArabic ? 'حجز جديد من تطبيق PuncakGO' : 'New Booking from PuncakGO App'}*%0A`;
        message += `%0A*${isArabic ? 'الفيلا:' : 'Villa:'}* ${isArabic ? currentVilla.name_ar : currentVilla.name_en}%0A`;
        message += `*${isArabic ? 'الاسم:' : 'Name:'}* ${name}%0A`;
        message += `*${isArabic ? 'الجوال:' : 'Phone:'}* ${phone}%0A`;
        message += `*${isArabic ? 'تاريخ الوصول:' : 'Check-in:'}* ${fromDate}%0A`;
        message += `*${isArabic ? 'تاريخ المغادرة:' : 'Check-out:'}* ${toDate}%0A`;
        message += `*${isArabic ? 'عدد الليالي:' : 'Nights:'}* ${nights}%0A`;
        message += `*${isArabic ? 'عدد الأشخاص:' : 'Persons:'}* ${persons}%0A`;
        message += `*${isArabic ? 'السعر الإجمالي:' : 'Total Price:'}* ${total} ${isArabic ? 'ألف روبيه' : 'K IDR'}%0A`;
        if (notes) message += `*${isArabic ? 'ملاحظات:' : 'Notes:'}* ${notes}%0A`;
        window.open(`https://wa.me/6281234567890?text=${message}`, '_blank');
        document.getElementById('orderModal').style.display = 'none';
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('dateFrom').value = '';
        document.getElementById('dateTo').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('couponCode').value = '';
        showToast(isArabic ? 'تم إرسال طلب الحجز بنجاح' : 'Booking request sent successfully');
    });
    document.getElementById('cancelOrderBtn').addEventListener('click', () => { document.getElementById('orderModal').style.display = 'none'; });
    document.getElementById('closeImageModal').addEventListener('click', () => { document.getElementById('imageModal').style.display = 'none'; });
    document.getElementById('closeFeaturesModal').addEventListener('click', () => { document.getElementById('featuresModal').style.display = 'none'; });
    
    window.addEventListener('resize', () => {
        renderPins();
        closePopup();
    });
    
    loadVillasData();
    renderVillas();
    setupFilter();
    setTimeout(() => renderPins(), 300);
</script>
